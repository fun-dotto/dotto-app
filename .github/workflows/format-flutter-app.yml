name: Format Flutter App

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - ready_for_review
      - reopened
      - synchronize
  schedule:
    - cron: 0 15 * * *
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash
    working-directory: .

jobs:
  format:
    name: Format
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          cache: false
          working_directory: .
      - name: Setup Dart path
        run: |
          echo 'export PATH="$HOME/.pub-cache/bin:$PATH"' >> ~/.zshrc
          export PATH="$HOME/.pub-cache/bin:$PATH"
      - run: mise setup-ci
      - run: mise format
      - name: Check for diff
        run: |
          if [ -n "$(git diff --name-only)" ]; then
            echo "::error::Code is not formatted. Run 'task format' and commit the changes."
            git diff --name-only
            exit 1
          fi
