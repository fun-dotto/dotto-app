include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    - api/**
    - lib/**/*.freezed.dart
    - lib/**/*.g.dart
    - test/**/*.mocks.dart
formatter:
  page_width: 80
  trailing_commas: automate
linter:
  rules:
    one_member_abstracts: false
    public_member_api_docs: false
