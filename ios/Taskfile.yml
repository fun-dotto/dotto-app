version: "3"

vars:
  DOTENVX: mise x -- dotenvx
  FASTLANE: mise x -- bundle exec fastlane

tasks:
  deploy-firebase-app-distribution:
    desc: Deploy iOS to Firebase App Distribution
    cmds:
      - "{{.DOTENVX}} run -f ../.env.keys -- {{.DOTENVX}} run -f ./fastlane/.env -- {{.FASTLANE}} deploy_firebase_app_distribution"

  deploy-testflight:
    desc: Deploy iOS to TestFlight
    cmds:
      - "{{.DOTENVX}} run -f ../.env.keys -- {{.DOTENVX}} run -f ./fastlane/.env -- {{.FASTLANE}} deploy_testflight"

  match-development:
    desc: Match development certificates (readonly)
    cmds:
      - "{{.DOTENVX}} run -f ../.env.keys -- {{.DOTENVX}} run -f ./fastlane/.env -- {{.FASTLANE}} match_development_readonly"

  register-device:
    desc: Register iOS device and update provisioning profiles
    vars:
      NAME: "{{.name}}"
      UDID: "{{.udid}}"
    cmds:
      - "{{.DOTENVX}} run -f ../.env.keys -- {{.DOTENVX}} run -f ./fastlane/.env -- {{.FASTLANE}} run register_device name:{{.NAME}} udid:{{.UDID}}"
      - "{{.DOTENVX}} run -f ../.env.keys -- {{.DOTENVX}} run -f ./fastlane/.env -- {{.FASTLANE}} match_development"
      - "{{.DOTENVX}} run -f ../.env.keys -- {{.DOTENVX}} run -f ./fastlane/.env -- {{.FASTLANE}} match_adhoc"
      - "{{.DOTENVX}} run -f ../.env.keys -- {{.DOTENVX}} run -f ./fastlane/.env -- {{.FASTLANE}} match_appstore"
