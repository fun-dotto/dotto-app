version: "3"

vars:
  FASTLANE: mise x -- bundle exec fastlane
  GCLOUD: mise x -- gcloud

tasks:
  fetch-fastlane-env:
    desc: Fetch .env for fastlane
    cmds:
      - rm -f ./fastlane/.env
      - "{{.GCLOUD}} secrets versions access latest --secret=app_env_fastlane_ios --project=swift2023groupc > ./fastlane/.env"

  download-appstore-metadata:
    desc: Download App Store metadata
    cmds:
      - "{{.FASTLANE}} deliver download_metadata"

  download-appstore-screenshots:
    desc: Download App Store screenshots
    cmds:
      - "{{.FASTLANE}} deliver download_screenshots"

  download-appstore-metadata-and-screenshots:
    desc: Download App Store metadata and screenshots
    cmds:
      - "{{.FASTLANE}} deliver download_metadata"
      - "{{.FASTLANE}} deliver download_screenshots"

  upload-appstore-metadata:
    desc: Upload App Store metadata
    cmds:
      - "{{.FASTLANE}} deliver --skip_binary_upload --skip_screenshots --force"

  upload-appstore-screenshots:
    desc: Upload App Store screenshots
    cmds:
      - "{{.FASTLANE}} deliver --skip_binary_upload --skip_metadata --force"

  upload-appstore-metadata-and-screenshots:
    desc: Upload App Store metadata and screenshots
    cmds:
      - "{{.FASTLANE}} deliver --skip_binary_upload --force"

  deploy-firebase-app-distribution:
    desc: Deploy iOS to Firebase App Distribution
    cmds:
      - "{{.FASTLANE}} deploy_firebase_app_distribution"

  deploy-testflight:
    desc: Deploy iOS to TestFlight
    cmds:
      - "{{.FASTLANE}} deploy_testflight"

  match-development:
    desc: Match development certificates (readonly)
    cmds:
      - "{{.FASTLANE}} match_development_readonly"

  register-device:
    desc: Register iOS device and update provisioning profiles
    vars:
      NAME: "{{.name}}"
      UDID: "{{.udid}}"
    cmds:
      - "{{.FASTLANE}} run register_device name:{{.NAME}} udid:{{.UDID}}"
      - "{{.FASTLANE}} match_development"
      - "{{.FASTLANE}} match_adhoc"
      - "{{.FASTLANE}} match_appstore"
