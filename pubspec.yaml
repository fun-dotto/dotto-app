name: dotto_workspace
publish_to: none

environment:
  sdk: 3.11.5

workspace:
  - apps/dotto # dotto
  - packages/dotto_api # openapi
  - packages/dotto_design_system # dotto_design_system
dev_dependencies:
  melos: 7.7.0

melos:
  command:
    bootstrap:
      hooks:
        pre:
          run: flutter config --enable-swift-package-manager
    clean:
      hooks:
        post:
          run: flutter clean
          exec:
            concurrency: 8
  scripts:
    gen:build_runner:
      run: dart run build_runner build --delete-conflicting-outputs
      exec:
        concurrency: 8
      packageFilters:
        dependsOn: "build_runner"
    gen:build_runner:watch:
      run: dart run build_runner watch --delete-conflicting-outputs
      exec:
        concurrency: 8
      packageFilters:
        dependsOn: "build_runner"
    test:unit:
      run: flutter test -j 8 --reporter=failures-only --dart-define=VERBOSE_TEST=false --no-pub
    fetch:dart_defines:
      steps:
        - rm -rf ./dart_defines
        - mkdir -p ./dart_defines
        - gcloud secrets versions access latest --secret=app_dart_define_development --project=swift2023groupc > ./apps/dotto/dart_defines/development.json
        - gcloud secrets versions access latest --secret=app_dart_define_production --project=swift2023groupc > ./apps/dotto/dart_defines/production.json
      packageFilters:
        scope: dotto
    setup:flutterfire:
      run: flutterfire configure --platforms="ios,android" --yes
      exec:
        concurrency: 1
      packageFilters:
        scope: dotto
